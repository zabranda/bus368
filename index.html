<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Líbeznice — odjezdy</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #121521;
      color: #f2f5ff;
    }

    .card {
      display: inline-block;
      width: fit-content;
      max-width: min(1100px, 96vw);
      box-sizing: border-box;
      background: #1b2030;
      border: 1px solid #2a3147;
      border-radius: 14px;
      padding: 1.2rem;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 0.4rem;
      font-size: 1.3rem;
    }

    .muted {
      color: #b6bfd8;
      margin: 0.25rem 0 0.8rem;
    }

    .columns {
      display: flex;
      flex-direction: row;
      gap: 1.25rem;
      width: fit-content;
      max-width: 100%;
    }

    @media (max-width: 780px) {
      .columns {
        flex-direction: column;
        width: 100%;
      }
    }

    .col {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      min-width: 220px;
    }

    .col-header {
      border-radius: 10px;
      padding: 0.9rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-weight: 700;
      font-size: 1rem;
    }

    .col-header .icon {
      font-size: 1.8rem;
    }

    .col-header .label {
      display: flex;
      flex-direction: column;
      font-size: 0.85rem;
      font-weight: 400;
      opacity: 0.85;
    }

    .col-header .label strong {
      font-size: 1rem;
      font-weight: 700;
    }

    .col--dablice .col-header {
      background: linear-gradient(135deg, #1a4fa0, #2e6fd4);
    }

    .col--predboj .col-header {
      background: linear-gradient(135deg, #1a6b3a, #2ea855);
    }

    .box {
      border: 1px solid #2f3750;
      border-radius: 10px;
      padding: 0.8rem;
      background: #151a28;
      box-sizing: border-box;
    }

    .box-label {
      font-size: 0.8rem;
      color: #8b9ac4;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.3rem;
    }

    .value {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0.2rem 0;
    }

    .sub {
      color: #b6bfd8;
      font-size: 0.85rem;
      margin: 0;
    }

    .status {
      margin-top: 0.8rem;
      color: #cbd3ea;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Líbeznice,II — odjezdy</h1>
    <p class="muted">Živé odjezdy ze zastávky Líbeznice,II.</p>

    <div class="columns">
      <div class="col col--dablice">
        <div class="col-header">
          <span class="icon">🏐</span>
          <div class="label">
            <strong>Sídliště Ďáblice</strong>
            na beach volejbal
          </div>
        </div>

        <div class="box">
          <div class="box-label">Nejbližší spoj</div>
          <div id="dablice1time" class="value">Načítám…</div>
          <div id="dablice1minutes" class="sub"></div>
          <div id="dablice1line" class="sub"></div>
        </div>

        <div class="box">
          <div class="box-label">Druhý nejbližší spoj</div>
          <div id="dablice2time" class="value">—</div>
          <div id="dablice2minutes" class="sub"></div>
          <div id="dablice2line" class="sub"></div>
        </div>
      </div>

      <div class="col col--predboj">
        <div class="col-header">
          <span class="icon">🏠</span>
          <div class="label">
            <strong>Předboj</strong>
            domů
          </div>
        </div>

        <div class="box">
          <div class="box-label">Nejbližší spoj</div>
          <div id="predboj1time" class="value">Načítám…</div>
          <div id="predboj1minutes" class="sub"></div>
          <div id="predboj1line" class="sub"></div>
        </div>

        <div class="box">
          <div class="box-label">Druhý nejbližší spoj</div>
          <div id="predboj2time" class="value">—</div>
          <div id="predboj2minutes" class="sub"></div>
          <div id="predboj2line" class="sub"></div>
        </div>
      </div>
    </div>

    <p id="status" class="status"></p>
  </main>

  <script>
    const CONFIG = {
      stopName: "Líbeznice,II",
      dabliceLines: ["348", "369"],
      predbojDestination: "predboj",
      predbojLine: "368",
      refreshMs: 20000,
      timezone: "Europe/Prague",
      proxyEndpoint: "/api/golemio"
    };

    const ui = {
      dablice1time: document.getElementById("dablice1time"),
      dablice1minutes: document.getElementById("dablice1minutes"),
      dablice1line: document.getElementById("dablice1line"),
      dablice2time: document.getElementById("dablice2time"),
      dablice2minutes: document.getElementById("dablice2minutes"),
      dablice2line: document.getElementById("dablice2line"),
      predboj1time: document.getElementById("predboj1time"),
      predboj1minutes: document.getElementById("predboj1minutes"),
      predboj1line: document.getElementById("predboj1line"),
      predboj2time: document.getElementById("predboj2time"),
      predboj2minutes: document.getElementById("predboj2minutes"),
      predboj2line: document.getElementById("predboj2line"),
      status: document.getElementById("status")
    };

    function normalizeText(value) {
      return (value || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .trim();
    }

    function formatPragueTime(isoDate) {
      return new Intl.DateTimeFormat("cs-CZ", {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        timeZone: CONFIG.timezone
      }).format(new Date(isoDate));
    }

    function getMinutesFromNow(isoDate) {
      if (!isoDate) return null;
      const ms = new Date(isoDate).getTime();
      if (isNaN(ms)) return null;
      return Math.round((ms - Date.now()) / 60000);
    }

    async function fetchFromProxy(path, params) {
      const proxyParams = new URLSearchParams();
      proxyParams.append("path", path);
      if (params) {
        for (const [k, v] of new URLSearchParams(params).entries()) {
          proxyParams.append(k, v);
        }
      }
      const response = await fetch(`${CONFIG.proxyEndpoint}?${proxyParams.toString()}`);
      const rawText = await response.text();
      if (!response.ok) throw new Error(`HTTP ${response.status} from proxy request`);
      return JSON.parse(rawText);
    }

    function departureToSummary(dep) {
      if (!dep) return null;
      const predicted =
        dep?.departure_timestamp?.predicted ||
        dep?.departure_timestamp?.scheduled || null;
      return {
        predicted,
        minutes: dep?.departure_timestamp?.minutes ?? getMinutesFromNow(predicted),
        line: dep?.route?.short_name || "?",
        headsign: dep?.trip?.headsign || ""
      };
    }

    function renderBox(timeEl, minutesEl, lineEl, data, emptyMsg) {
      if (!data || !data.predicted) {
        timeEl.textContent = emptyMsg || "Žádný spoj";
        minutesEl.textContent = "";
        lineEl.textContent = "";
        return;
      }
      timeEl.textContent = formatPragueTime(data.predicted);
      minutesEl.textContent = `Za ${data.minutes ?? "?"} minut`;
      lineEl.textContent = `Linka ${data.line} — ${data.headsign}`;
    }

    async function refresh() {
      ui.status.textContent = "Načítám živá data…";
      try {
        const params = new URLSearchParams();
        params.append("names[]", CONFIG.stopName);
        params.append("minutesBefore", "1");
        params.append("minutesAfter", "720");
        params.append("order", "real");
        params.append("limit", "80");
        params.append("mode", "departures");

        const board = await fetchFromProxy("/v2/pid/departureboards", params);
        const departures = board?.departures || [];

        const dabliceMatches = departures.filter(d =>
          CONFIG.dabliceLines.includes(String(d?.route?.short_name || ""))
        );

        const predbojMatches = departures.filter(d =>
          String(d?.route?.short_name || "") === CONFIG.predbojLine &&
          normalizeText(d?.trip?.headsign || "").includes(CONFIG.predbojDestination)
        );

        renderBox(ui.dablice1time, ui.dablice1minutes, ui.dablice1line, departureToSummary(dabliceMatches[0]), "Žádný spoj");
        renderBox(ui.dablice2time, ui.dablice2minutes, ui.dablice2line, departureToSummary(dabliceMatches[1]), "—");
        renderBox(ui.predboj1time, ui.predboj1minutes, ui.predboj1line, departureToSummary(predbojMatches[0]), "Žádný spoj");
        renderBox(ui.predboj2time, ui.predboj2minutes, ui.predboj2line, departureToSummary(predbojMatches[1]), "—");

        ui.status.textContent = `Aktualizováno: ${new Date().toLocaleTimeString("cs-CZ")}`;
      } catch (err) {
        ui.status.textContent = `Chyba: ${err.message}`;
      }
    }

    let timerId = null;
    function startPolling() {
      if (timerId) clearInterval(timerId);
      refresh();
      timerId = setInterval(refresh, CONFIG.refreshMs);
    }

    startPolling();
  </script>
</body>
</html>
